<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн голосование</title>
    
    <!-- Bootstrap CSS для красивого дизайна -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Наши собственные стили -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Навигационная панель -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🗳️ Система онлайн голосования</span>
        <a href="/results" class="btn btn-outline-light">📊 Результаты</a>
    </div>
</nav>
    
    <!-- Основной контент -->
    <div class="container mt-5">
        <h1 class="text-center mb-4">Выберите кандидата</h1>
        
        <!-- Контейнер для карточек кандидатов -->
        <div class="row" id="candidates-container">
            <!-- Карточки будут добавлены через JavaScript -->
        </div>
        
        <!-- Сообщения для пользователя -->
        <div id="message" class="alert mt-3" style="display: none;"></div>
    </div>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Наш JavaScript -->
    <script src="/static/js/voting.js"></script>
</body>
</html>
